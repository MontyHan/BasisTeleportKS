<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>VR/AR Geometrie</title>
  <style>
    body { margin:0; overflow:hidden; }

    #ar-overlay {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0, 0, 40, 0.88);
      color: white;
      font-family: Arial, sans-serif;
      padding: 8px 10px;
      z-index: 100;
      user-select: none;
    }
    #ar-overlay .ar-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }
    #ar-overlay button {
      background: #2244cc;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 9px 13px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      min-width: 44px;
      touch-action: manipulation;
    }
    #ar-overlay button.tog-on  { background: #227722; }
    #ar-overlay button.tog-off { background: #2244cc; }
    #ar-overlay button.del-btn { background: #883322; }
    #ar-overlay .ar-axis {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.12);
      padding: 4px 9px;
      border-radius: 7px;
    }
    #ar-overlay .ax-label {
      font-weight: bold;
      font-size: 17px;
      min-width: 14px;
    }
    #ar-overlay .ax-val {
      font-size: 18px;
      font-weight: bold;
      min-width: 32px;
      text-align: center;
    }
    #ar-status {
      text-align: center;
      font-size: 14px;
      color: white;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <!-- AR DOM Overlay (hidden in VR/desktop, shown in AR session) -->
  <div id="ar-overlay">
    <!-- Koordinaten-Reihe -->
    <div class="ar-row">
      <div class="ar-axis">
        <span class="ax-label">X</span>
        <button id="ar-x-m">−</button>
        <span id="ar-x-v" class="ax-val">0</span>
        <button id="ar-x-p">+</button>
      </div>
      <div class="ar-axis">
        <span class="ax-label">Y</span>
        <button id="ar-y-m">−</button>
        <span id="ar-y-v" class="ax-val">0</span>
        <button id="ar-y-p">+</button>
      </div>
      <div class="ar-axis">
        <span class="ax-label">Z</span>
        <button id="ar-z-m">−</button>
        <span id="ar-z-v" class="ax-val">0</span>
        <button id="ar-z-p">+</button>
      </div>
      <button id="ar-punkt">PUNKT</button>
      <button id="ar-gerade">GERADE</button>
      <button id="ar-vektor">VEKTOR</button>
    </div>
    <!-- λ + PARAM + LAENGE -->
    <div class="ar-row">
      <div class="ar-axis">
        <span class="ax-label" style="font-style:italic">λ</span>
        <button id="ar-lam-m">−</button>
        <span id="ar-lam-v" class="ax-val">0</span>
        <button id="ar-lam-p">+</button>
      </div>
      <button id="ar-param">PARAM</button>
      <button id="ar-laenge">LAENGE</button>
      <button id="ar-pdel" class="del-btn">P-DEL</button>
      <button id="ar-gdel" class="del-btn">G-DEL</button>
      <button id="ar-alles" class="del-btn">ALLES</button>
    </div>
    <!-- Toggles -->
    <div class="ar-row">
      <button id="ar-ov"  class="tog-off">OV:AUS</button>
      <button id="ar-rv"  class="tog-on" >RV:AN</button>
      <button id="ar-gg"  class="tog-off">GG:AUS</button>
      <button id="ar-gl"  class="tog-on" >GL:AN</button>
      <button id="ar-ks"  class="tog-off">KS:AUS</button>
    </div>
    <div id="ar-status">Bereit – Tipp auf Objekte zum Auswählen</div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
